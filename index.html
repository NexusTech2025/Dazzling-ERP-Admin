    <!-- Theme Toggle Script (Prevent Flashing) -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 'light';
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
